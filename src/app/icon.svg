<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Trust Blue background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#0f2a52"/>
  <!-- White "C" lettermark, bold, slightly oversized for impact at small sizes -->
  <text
    x="16"
    y="23"
    font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-size="20"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="-0.5"
  >C</text>
  <!-- Small "R" superscript to hint at "CR" / CarRentDesk -->
  <text
    x="23"
    y="15"
    font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-size="9"
    font-weight="600"
    fill="rgba(255,255,255,0.65)"
    text-anchor="middle"
  >R</text>
</svg>
